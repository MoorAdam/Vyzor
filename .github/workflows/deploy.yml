name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Security Audit ─────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Composer security audit
        run: composer audit --no-dev --format=plain --abandoned=ignore

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: NPM security audit
        run: npm audit --audit-level=high --omit=dev

  # ── Job 2: Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEPLOY_DIR: ${{ secrets.APP_PATH }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          envs: GH_PAT,DEPLOY_DIR,REPO_NAME
          script: |
            # ── First deployment: clone if not exists ──
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              mkdir -p "$(dirname "$DEPLOY_DIR")"
              git clone "https://${GH_PAT}@github.com/${REPO_NAME}.git" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # ── Ensure .env exists ──
            if [ ! -f ".env" ]; then
              cp .env.production.example .env
              echo "WARNING: Created .env from template - CONFIGURE IT BEFORE CONTINUING!"
              exit 1
            fi

            # ── Phase 1: Pull latest code ──
            echo "=== Phase 1: Pulling latest code ==="
            git remote set-url origin "https://${GH_PAT}@github.com/${REPO_NAME}.git"
            git fetch origin
            git reset --hard origin/main

            # Remove stale dev artifact — if present, @vite serves from dev server instead of built assets
            rm -f public/hot

            # ── Phase 2: Build runtime image & start containers ──
            echo "=== Phase 2: Starting containers ==="
            docker compose -f docker-compose.production.yml build
            docker compose -f docker-compose.production.yml up -d --remove-orphans

            # Wait for PHP-FPM to be ready
            echo "Waiting for services..."
            for i in $(seq 1 60); do
              if docker compose -f docker-compose.production.yml exec -T vyzor-app php -r "echo 'ok';" 2>/dev/null | grep -q ok; then
                echo "Services ready after ${i}s"
                break
              fi
              sleep 1
            done

            # ── Phase 2b: First-deploy one-time tasks ──
            # Generate APP_KEY if not set
            if ! grep -q "^APP_KEY=base64:" .env 2>/dev/null; then
              NEW_KEY=$(docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan key:generate --show)
              sed -i "s/^APP_KEY=.*/APP_KEY=${NEW_KEY}/" .env
              echo "Generated new APP_KEY"
            fi

            # ── Phase 3: Install dependencies & build assets ──
            echo "=== Phase 3: Installing dependencies ==="
            docker compose -f docker-compose.production.yml exec -T vyzor-app composer install --no-dev --optimize-autoloader --no-interaction --no-progress
            docker compose -f docker-compose.production.yml exec -T vyzor-app npm ci
            docker compose -f docker-compose.production.yml exec -T vyzor-app npm run build

            # ── Phase 4: Post-deploy tasks ──
            echo "=== Phase 4: Post-deploy tasks ==="
            docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan migrate --force

            # Seed database on first deploy only
            if [ ! -f ".seeded" ]; then
              docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan db:seed --class=AiContextSeeder --force
              touch .seeded
              echo "Database seeded (first deploy)"
            fi

            docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan optimize:clear
            docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan optimize
            docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan storage:link 2>/dev/null || true
            docker compose -f docker-compose.production.yml exec -T vyzor-app php artisan queue:restart

            # Fix permissions
            docker compose -f docker-compose.production.yml exec -T vyzor-app chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache || true
            docker compose -f docker-compose.production.yml exec -T vyzor-app chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache || true

            # Reload NPM nginx to refresh DNS for new container IPs
            docker exec nginx-proxy-manager nginx -s reload 2>/dev/null || true

            docker compose -f docker-compose.production.yml ps
            echo "Deployment completed successfully!"
