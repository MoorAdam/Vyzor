name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Security Audit ─────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Composer security audit
        run: composer audit --no-dev --format=plain --abandoned=ignore

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: NPM security audit
        run: npm audit --audit-level=high

  # ── Job 2: Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEPLOY_DIR: ${{ secrets.APP_PATH }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          envs: GH_PAT,DEPLOY_DIR,REPO_NAME
          script: |
            cd "$DEPLOY_DIR"

            # ── First deployment: clone if not exists ──
            if [ ! -d ".git" ]; then
              git clone "https://${GH_PAT}@github.com/${REPO_NAME}.git" "$DEPLOY_DIR"
            fi

            # ── Ensure .env exists ──
            if [ ! -f ".env" ]; then
              cp .env.production.example .env
              echo "WARNING: Created .env from template - CONFIGURE IT BEFORE CONTINUING!"
              exit 1
            fi

            # ── Phase 1: Pull latest code ──
            echo "=== Phase 1: Pulling latest code ==="
            git remote set-url origin "https://${GH_PAT}@github.com/${REPO_NAME}.git"
            git fetch origin
            git reset --hard origin/main

            # ── Phase 2: Build new images (old containers keep running) ──
            echo "=== Phase 2: Building images ==="
            docker compose -f docker-compose.production.yml build

            # ── Phase 3: Restart with new images ──
            echo "=== Phase 3: Restarting services ==="
            docker compose -f docker-compose.production.yml up -d --force-recreate --remove-orphans

            # Wait for PHP-FPM to be ready
            echo "Waiting for services..."
            for i in $(seq 1 60); do
              if docker compose -f docker-compose.production.yml exec -T app php -r "echo 'ok';" 2>/dev/null | grep -q ok; then
                echo "Services ready after ${i}s"
                break
              fi
              sleep 1
            done

            # ── Phase 3b: First-deploy one-time tasks ──
            # Generate APP_KEY if not set
            if ! grep -q "^APP_KEY=base64:" .env 2>/dev/null; then
              NEW_KEY=$(docker compose -f docker-compose.production.yml exec -T app php artisan key:generate --show)
              sed -i "s/^APP_KEY=.*/APP_KEY=${NEW_KEY}/" .env
              echo "Generated new APP_KEY — restarting app services..."
              docker compose -f docker-compose.production.yml restart app queue scheduler
              sleep 5
            fi

            # ── Phase 4: Post-deploy tasks ──
            echo "=== Phase 4: Post-deploy tasks ==="
            docker compose -f docker-compose.production.yml exec -T app php artisan migrate --force

            # Seed database on first deploy only
            if [ ! -f ".seeded" ]; then
              docker compose -f docker-compose.production.yml exec -T app php artisan db:seed --force
              touch .seeded
              echo "Database seeded (first deploy)"
            fi

            docker compose -f docker-compose.production.yml exec -T app php artisan optimize
            docker compose -f docker-compose.production.yml exec -T app php artisan storage:link 2>/dev/null || true
            docker compose -f docker-compose.production.yml exec -T app php artisan queue:restart

            # Fix permissions
            docker compose -f docker-compose.production.yml exec -T app chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache || true
            docker compose -f docker-compose.production.yml exec -T app chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache || true

            # Reload NPM nginx to refresh DNS for new container IPs
            docker exec nginx-proxy-manager nginx -s reload 2>/dev/null || true

            docker compose -f docker-compose.production.yml ps
            echo "Deployment completed successfully!"
